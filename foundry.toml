[profile.default]
solc_version = "0.8.30"
evm_version = "cancun"

optimizer = true
optimizer_runs = 245

via_ir = true

remappings = [
  "@solady=lib/solady/",
  "@forge=lib/forge-std/src/",
  "@zamm=lib/ZAMM/src/"
]

[fmt]
line_length = 100

[rpc_endpoints]
main = "https://ethereum-rpc.publicnode.com"